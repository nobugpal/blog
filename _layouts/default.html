---
layout: minimal
---

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ site.description }}" />
    <meta name="author" content="{{ site.author.name }}" />
    
    <title>{{ page.title | default: site.title }}</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
    
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #24292e;
        background-color: #fafbfc;
      }
      
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 20px;
      }
      
      header, footer {
        text-align: center;
        padding: 40px 0;
        border-bottom: 1px solid #e1e4e8;
      }
      
      .logo {
        font-size: 2rem;
        font-weight: 700;
        color: #24292e;
        text-decoration: none;
      }
      
      .description {
        font-size: 1.1rem;
        color: #586069;
        margin-top: 10px;
      }
      
      .home {
        padding: 60px 0;
      }
      
      .page-heading {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
      }
      
      .lead {
        font-size: 1.2rem;
        color: #586069;
      }
      
      .post-list {
        list-style: none;
        padding: 0;
        margin-top: 30px;
      }
      
      .post-list li {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #e1e4e8;
      }
      
      .post-meta {
        color: #586069;
        font-size: 0.9rem;
      }
      
      .post-title {
        color: #24292e;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      
      .post-title:hover {
        color: #0366d6;
      }
      
      .site-footer {
        background-color: #f6f8fa;
        border-top: 1px solid #e1e4e8;
        font-size: 0.9rem;
        color: #586069;
      }
      
      a {
        color: #0366d6;
        text-decoration: none;
      }
      
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  
  <body>
    <header class="site-header">
      <div class="container">
        <a href="/" class="logo">{{ site.title }}</a>
        <p class="description">{{ site.description }}</p>
      </div>
    </header>
    
    <main class="container content">
      {{ content }}
    </main>
    
    <footer class="site-footer">
      <div class="container">
        <p>© {{ site.time | date: '%Y' }} {{ site.author.name }}. Powered by Jekyll.</p>
      </div>
    </footer>
  </body>
</html>
