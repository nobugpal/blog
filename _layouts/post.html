---
layout: minimal
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.categories %}· <span class="categories">{{ page.categories | join: " · " }}</span>{% endif %}
    </div>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
