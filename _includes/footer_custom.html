<!-- Initialize Mermaid.js for diagram rendering -->
<script>
if (typeof mermaid !== 'undefined') {
  mermaid.initialize({
    startOnLoad: true,
    theme: 'dark',
    darkMode: true,
    securityLevel: 'loose',
    fontFamily: 'Lora', 'Georgia', serif,
    flowchart: { curve: 'basis', padding: 20 },
    themeVariables: {
      fontFamily: 'Lora', 'Georgia', serif,
      fontSize: '16px',
      darkMode: true,
      background: '#191c23',
      primaryColor: '#2c3e50',
      primaryTextColor: '#ecf0f1',
      primaryBorderColor: '#34495e',
      lineColor: '#7f8c8d',
      secondaryColor: '#34495e',
      tertiaryColor: '#2c3e50'
    }
  });
}
</script>
